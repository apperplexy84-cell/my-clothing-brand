<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUR BRAND | London</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black antialiased">

    <nav class="flex justify-between items-center p-6 uppercase tracking-widest text-sm border-b border-gray-100">
        <div class="font-bold text-xl">BRAND NAME</div>
        <div class="space-x-8 hidden md:flex">
            <a href="#" class="hover:underline">Shop</a>
            <a href="#" class="hover:underline">Archive</a>
            <a href="#" class="hover:underline">London</a>
        </div>
        <div>Cart (0)</div>
    </nav>

    <section class="h-[80-vh] flex items-center justify-center bg-gray-50 py-20">
        <div class="text-center">
            <h1 class="text-6xl md:text-8xl font-black italic uppercase tracking-tighter mb-4">New Drop</h1>
            <p class="text-gray-500 uppercase tracking-widest text-sm mb-8">Available exclusively in London & Online</p>
            <a href="#" class="bg-black text-white px-10 py-4 uppercase font-bold hover:bg-gray-800 transition">Shop Now</a>
        </div>
    </section>

    <section class="max-w-7xl mx-auto py-20 px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="group cursor-pointer">
                <div class="bg-gray-100 aspect-[3/4] mb-4 overflow-hidden">
                    <img src="images/item1.jpg" alt="Hoodie" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                </div>
                <h3 class="font-bold uppercase text-sm">Heavyweight Hoodie</h3>
                <p class="text-gray-500">£85.00</p>
            </div>
            <div class="group cursor-pointer">
                <div class="bg-gray-100 aspect-[3/4] mb-4 overflow-hidden">
                    <img src="images/item2.jpg" alt="Tee" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                </div>
                <h3 class="font-bold uppercase text-sm">Boxy Graphic Tee</h3>
                <p class="text-gray-500">£45.00</p>
            </div>
        </div>
    </section>

    <footer class="p-10 border-t border-gray-100 text-center text-xs text-gray-400 uppercase tracking-widest">
        &copy; 2026 BRAND NAME. Made in London.
    </footer>

</body>
</html>
